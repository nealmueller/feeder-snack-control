name: FeederSnackControl
options:
  bundleIdPrefix: com.nealmueller
  deploymentTarget:
    macOS: "26.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
packages: {}
targets:
  WhiskersMac:
    type: application
    platform: macOS
    sources:
      - path: Shared
      - path: WhiskersMac
      - path: Python
        type: folder
    resources:
      - path: Assets.xcassets
      - path: Resources/AppIcon.icns
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nealmueller.FeederSnackControl
        PRODUCT_NAME: Feeder Snack Control
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: WhiskersMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: WhiskersMac/WhiskersMac.entitlements
    postBuildScripts:
      - name: Prepare Embedded Python
        script: |
          set -euo pipefail
          "$SRCROOT/Scripts/prepare_embedded_python.sh"
    dependencies:
      - target: WhiskersControls
    scheme:
      testTargets: []
  WhiskersControls:
    type: app-extension
    platform: macOS
    sources:
      - path: Shared
      - path: WhiskersControls
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nealmueller.FeederSnackControl.Controls
        PRODUCT_NAME: Feeder Snack Control Controls
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: WhiskersControls/Info.plist
        CODE_SIGN_ENTITLEMENTS: WhiskersControls/WhiskersControls.entitlements
